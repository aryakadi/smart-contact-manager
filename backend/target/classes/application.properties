# ===========================
# Server Configuration
# ===========================
server.port=8080

# ===========================
# MongoDB Configuration
# ===========================
spring.data.mongodb.uri=${MONGO_URI}

# ===========================
# JWT Configuration
# (Set JWT_SECRET as an environment variable, or replace the default below)
# ===========================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===========================
# Cloudinary Configuration
# (Fill in your Cloudinary credentials from your dashboard)
# ===========================
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${API_KEY}
cloudinary.api-secret=${API_SECRET}

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Logging
# ===========================
logging.level.com.scm=DEBUG
logging.level.org.springframework.security=INFO
